<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Family Hub</title>
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"Family Hub","short_name":"FamilyHub","start_url":"/family-hub/","display":"standalone","background_color":"#2c3e50","theme_color":"#2c3e50","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/609/609803.png","sizes":"512x512","type":"image/png","purpose":"any maskable"}]}'>

    <style>
        :root { 
            --primary: #2c3e50; --secondary: #34495e; --accent: #3498db; 
            --success: #27ae60; --danger: #e74c3c; --light: #ecf0f1; --warning: #f39c12;
            --text-main: #2c3e50; --text-muted: #636e72;
        }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: #f0f2f5; color: var(--text-main); transition: 0.3s; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* Sidebar */
        nav { width: 240px; background: var(--primary); color: white; height: 100vh; position: fixed; z-index: 100; transition: 0.3s; overflow-x: hidden; }
        nav.collapsed { width: 0; }
        nav h2 { padding: 25px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); margin: 0; white-space: nowrap; font-size: 1.1rem; }
        nav button { width: 100%; padding: 15px 25px; background: none; border: none; color: #bdc3c7; text-align: left; font-size: 16px; cursor: pointer; white-space: nowrap; display: flex; justify-content: space-between; align-items: center; }
        nav button:hover { background: var(--secondary); color: white; }
        nav button.active { background: var(--accent); color: white; border-left: 5px solid white; }
        .badge { background: var(--danger); color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        .admin-only { display: none; }

        #nav-toggle { position: fixed; left: 250px; top: 20px; z-index: 101; background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        nav.collapsed + #nav-toggle { left: 20px; }

        main { margin-left: 240px; padding: 40px; width: 100%; box-sizing: border-box; transition: 0.3s; }
        main.expanded { margin-left: 0; padding-left: 80px; }
        
        @media (max-width: 768px) {
            main { margin-left: 0; padding: 20px; padding-top: 80px; }
            main.expanded { padding-left: 20px; }
            nav { width: 85%; }
            #nav-toggle { left: 20px; }
        }

        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 20px; position: relative; }
        .header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        #clock-box { text-align: right; }
        
        .user-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding-top: 15px; }
        .user-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-top: 5px solid var(--accent); position: relative; display: flex; flex-direction: column; min-height: 150px; }
        .user-header { padding: 15px 20px; background: #fcfcfc; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; }
        .currency-pill { font-size: 0.85rem; font-weight: bold; color: var(--success); background: #e8f8f5; padding: 5px 12px; border-radius: 20px; }
        
        .chore-item { display: flex; align-items: flex-start; gap: 15px; padding: 18px 20px; border-bottom: 1px solid #f0f0f0; }
        .chore-item.completed { background: #f8fff9; opacity: 0.7; }
        .chore-item.pending { background: #fffbe6; }
        
        .progress-container { width: 100%; background: #eee; border-radius: 10px; height: 8px; margin-top: 8px; overflow: hidden; border: 1px solid #e0e0e0; }
        .progress-fill { background: linear-gradient(90deg, var(--accent), var(--success)); height: 100%; transition: 0.5s ease-out; }
        .milestone-text { font-size: 11px; color: var(--text-muted); font-weight: 700; margin-top: 4px; text-transform: uppercase; }

        input[type="checkbox"] { width: 26px; height: 26px; cursor: pointer; }

        .card-celebration { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200; text-align: center; border-radius: 12px; pointer-events: none; padding: 20px; box-sizing: border-box; }
        .kid-theme { background: rgba(44, 62, 80, 0.98); color: white; border: 4px solid var(--accent); }
        .teen-theme { background: rgba(52, 73, 94, 0.98); color: #ecf0f1; border: 4px solid var(--warning); }
        .card-celebration-msg { font-size: 2rem; font-weight: 900; animation: bounceIn 0.6s; text-shadow: 0 0 10px rgba(0,0,0,0.5); line-height: 1.1; }

        @keyframes bounceIn { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }

        /* Admin Components */
        .admin-form-box { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; background: #f8f9fa; padding: 20px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.85rem; font-weight: 800; color: var(--secondary); text-transform: uppercase; }
        input, select, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 14px; }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-danger { background: white; color: var(--danger); border: 1px solid var(--danger); padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .btn-nuclear { background: var(--danger); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; border: 2px solid #c0392b; transition: 0.2s; }
        .btn-nuclear:hover { background: #c0392b; transform: scale(0.98); }
        
        .hidden { display: none !important; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid #eee; background: #fafafa; font-size: 0.8rem; color: #888; }
        td { padding: 15px; border-bottom: 1px solid #eee; vertical-align: middle; }
        
        .calendar-container { width: 100%; height: 650px; border-radius: 10px; overflow: hidden; margin-top: 15px; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; background: #f9f9f9; }
        .calendar-container iframe { width: 100% !important; height: 100% !important; border: 0; }
    </style>
</head>
<body onmousemove="resetSidebarTimer()" ontouchstart="resetSidebarTimer()">

<nav id="sidebar">
    <h2>Family Hub</h2>
    <button id="nav-dashboard" onclick="showSection('dashboard')"><span>🏠 Dashboard</span></button>
    <div id="admin-menu" class="admin-only">
        <button id="nav-approvals" onclick="handleAdminNav('admin-approvals')">
            <span>✅ Approvals</span>
            <span id="approval-badge" class="badge hidden">0</span>
        </button>
        <button id="nav-members" onclick="handleAdminNav('admin-members')"><span>👥 Manage Family</span></button>
        <button id="nav-chores" onclick="handleAdminNav('admin-chores')"><span>⚙️ Chore Config</span></button>
    </div>
    <button id="unlock-btn" style="color:var(--warning); margin-top:20px;" onclick="toggleAdminLock()"><span>🔒 Admin Lock</span></button>
</nav>

<button id="nav-toggle" onclick="toggleSidebar()">☰</button>

<main id="main-content">
    <section id="dashboard" class="content-section">
        <div class="header-row">
            <h1>Family Hub</h1>
            <div id="clock-box">
                <div id="current-date" style="font-weight:bold"></div>
                <div id="current-time"></div>
            </div>
        </div>
        <div id="quote-box" style="font-style:italic; color:var(--accent); margin-bottom:25px; border-left:4px solid var(--accent); padding-left:15px; min-height:1.2em;"></div>
        
        <div class="card">
            <div id="teen-toast-area" style="width:100%; display:none; background:#34495e; color:#fff; padding:15px; border-radius:10px; margin-bottom:20px; text-align:center; font-weight:600; border-left:10px solid var(--warning); animation:slideDown 0.4s;"></div>
            <div class="section-header" style="display:flex; justify-content:space-between; cursor:pointer;" onclick="toggleAccordion('choresVisible')">
                <h3 style="margin:0">🧹 Daily Chores</h3><span id="chores-icon">▼</span>
            </div>
            <div id="chores-body" class="user-grid"></div>
        </div>

        <div class="card">
            <div class="section-header" style="display:flex; justify-content:space-between; cursor:pointer;" onclick="toggleAccordion('weekVisible')">
                <h3 style="margin:0">📅 Weekly Schedule</h3><span id="week-icon">▼</span>
            </div>
            <div id="week-body" class="hidden">
                <div class="calendar-container" id="week-calendar-slot">
                    <div style="color:#888; font-style:italic;">Setup calendar link in Admin Settings</div>
                </div>
            </div>
        </div>
    </section>

    <section id="admin-members" class="content-section hidden">
        <div class="card">
            <h1>Manage Family</h1>
            <div class="admin-form-box">
                <div class="form-group"><label>Full Name</label><input type="text" id="m-name"></div>
                <div class="form-group"><label>Role</label><select id="m-role"><option value="kid">Kid</option><option value="teen">Teen</option><option value="adult">Adult</option></select></div>
                <button class="btn-primary" onclick="addMember()">Add Member</button>
            </div>
            <table><thead><tr><th>Name</th><th>Role</th><th>Balance</th><th>Action</th></tr></thead><tbody id="member-list-body"></tbody></table>
            
            <div style="background: #fdfefe; border: 1px dashed var(--accent); padding: 20px; border-radius: 12px; margin-top: 20px;">
                <h3>🛡️ Private Calendar Setup</h3>
                <input type="text" id="cal-url-input" placeholder="Paste Embed URL here..." style="width:100%">
                <button class="btn-primary" style="margin-top:10px" onclick="saveCalendarUrl()">Save Calendar</button>
            </div>

            <div style="background: #f4f7f9; padding: 20px; border-radius: 12px; margin-top: 20px;">
                <strong>Data Management:</strong><br><br>
                <button class="btn-primary" style="background:var(--success); margin-bottom: 5px;" onclick="exportData()">📤 Export Backup (.json)</button>
                <button class="btn-primary" style="background:var(--secondary); margin-bottom: 5px;" onclick="document.getElementById('importFile').click()">📥 Import Backup</button>
                <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
                
                <hr style="border:0; border-top:1px solid #ddd; margin:15px 0;">
                <button class="btn-nuclear" onclick="nuclearReset()">☢️ Nuclear Reset: Wipe All App Data</button>
            </div>
        </div>
    </section>

    <section id="admin-chores" class="content-section hidden">
        <div class="card">
            <h1>Chore Configuration</h1>
            <div class="admin-form-box">
                <div class="form-group"><label>Chore Name</label><input type="text" id="c-name"></div>
                <div class="form-group"><label>Assign To</label><select id="c-assignee"></select></div>
                <div class="form-group" style="grid-column: span 2;"><label>Instructions</label><textarea id="c-desc" rows="2"></textarea></div>
                <div class="form-group"><label>Goal Count</label><input type="number" id="c-goal" value="0"></div>
                <div class="form-group"><label>Prize</label><input type="text" id="c-prize"></div>
                <div class="form-group"><label>Logic</label><select id="c-type" onchange="togglePointForm('c-type','c-static','c-dynamic')"><option value="static">Static</option><option value="dynamic">Dynamic</option></select></div>
                <div id="c-static" class="form-group"><label>Points</label><input type="number" id="c-points" value="5"></div>
                <div id="c-dynamic" class="hidden" style="display:flex; gap:10px;"><div class="form-group"><label>Max</label><input type="number" id="c-max" value="10"></div><div class="form-group"><label>Min</label><input type="number" id="c-min" value="2"></div></div>
            </div>
            <button class="btn-primary" onclick="addChore()">Save Chore</button>
        </div>
        <div class="card">
            <table><thead><tr><th>Chore</th><th>Goal</th><th>Assigned</th><th>Action</th></tr></thead><tbody id="chore-list-body"></tbody></table>
        </div>
    </section>

    <section id="admin-approvals" class="content-section hidden">
        <div class="card"><h1>Approval Queue</h1><table><thead><tr><th>Child</th><th>Chore</th><th>Value</th><th>Action</th></tr></thead><tbody id="approval-list-body"></tbody></table></div>
    </section>
</main>

<script>
    const ADMIN_PASSCODE = "1234";
    const kidMessages = ["BOOM! 🚀", "YOU WIN! 🏆", "LEGEND! 🔥"];
    const teenMessages = ["Impressive. 🙄", "One closer. 📱", "Functional. 👏"];
    const quotes = ["Hub Active.", "Speedrun starts now.", "Work hard, play hard."];

    let isUnlocked = false; 
    let sidebarTimer;
    let state = JSON.parse(localStorage.getItem('familyHubData')) || { 
        members: [], chores: [], approvals: [], 
        lastResetDate: new Date().toDateString(), 
        choresVisible: true, weekVisible: false, calendarUrl: "" 
    };
    const currencyMap = { kid: "tokens", teen: "minutes", adult: "" };

    function save() { localStorage.setItem('familyHubData', JSON.stringify(state)); renderAll(); }

    function nuclearReset() {
        if(confirm("DANGER: This will permanently delete EVERY setting, member, and chore recorded in this app.")) {
            if(confirm("LAST WARNING: Are you absolutely sure?")) {
                localStorage.removeItem('familyHubData');
                location.reload();
            }
        }
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('current-date').innerText = now.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
        document.getElementById('current-time').innerText = now.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        if (now.toDateString() !== state.lastResetDate) {
            state.members.forEach(m => { if(m.role === 'teen') m.points = 0; });
            state.lastResetDate = now.toDateString(); save();
        }
    }
    setInterval(updateClock, 1000); updateClock();

    function saveCalendarUrl() {
        const url = document.getElementById('cal-url-input').value.trim();
        if(url.includes('calendar.google.com')) { state.calendarUrl = url; save(); location.reload(); }
        else { alert("Invalid URL."); }
    }

    function loadCalendars() {
        if (state.calendarUrl && document.getElementById('week-calendar-slot')) {
            const weekUrl = state.calendarUrl.replace(/mode=[A-Z]+/, "mode=WEEK");
            document.getElementById('week-calendar-slot').innerHTML = `<iframe src="${weekUrl}"></iframe>`;
            document.getElementById('cal-url-input').value = state.calendarUrl;
        }
    }

    function toggleAdminLock() {
        if (isUnlocked) {
            isUnlocked = false; document.getElementById('admin-menu').style.display = 'none';
            document.getElementById('unlock-btn').innerHTML = "<span>🔒 Admin Lock</span>";
            showSection('dashboard');
        } else if (prompt("Passcode:") === ADMIN_PASSCODE) {
            isUnlocked = true; document.getElementById('admin-menu').style.display = 'block';
            document.getElementById('unlock-btn').innerHTML = "<span>🔓 Admin Mode</span>";
        }
    }

    function toggleSidebar(force = false) {
        const sb = document.getElementById('sidebar'); const main = document.getElementById('main-content');
        if (force) { sb.classList.add('collapsed'); main.classList.add('expanded'); }
        else { sb.classList.toggle('collapsed'); main.classList.toggle('expanded'); }
    }
    function resetSidebarTimer() { clearTimeout(sidebarTimer); sidebarTimer = setTimeout(() => { if (!isUnlocked && window.innerWidth > 768) toggleSidebar(true); }, 8000); }
    function handleAdminNav(id) { if (isUnlocked) showSection(id); else toggleAdminLock(); }
    function showSection(id) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        const btn = document.getElementById('nav-' + id.replace('admin-', '')); if(btn) btn.classList.add('active');
        if(id === 'admin-chores') updateAssigneeDropdowns();
        renderAll();
    }

    function calculateVal(c) {
        if(c.type === 'static') return c.points || 5;
        const yest = new Date(Date.now() - 86400000).toDateString();
        return (c.lastCompleted === yest) ? (c.dynamic?.min || 2) : (c.dynamic?.max || 10);
    }

    function toggleChoreCompletion(choreId, memberId) {
        const chore = state.chores.find(c => c.id === choreId);
        const member = state.members.find(m => m.id === memberId);
        state.approvals.push({ id: Date.now(), choreId, memberId, date: new Date().toDateString(), points: calculateVal(chore), choreName: chore.name });
        const overlay = document.getElementById(`celebrate-${memberId}`);
        const msgBox = overlay.querySelector('.card-celebration-msg');
        if (member.role === 'kid' || member.role === 'teen') {
            let msg;
            if (member.role === 'kid') {
                overlay.className = "card-celebration kid-theme";
                msg = kidMessages[Math.floor(Math.random()*kidMessages.length)];
                const count = (chore.timesCompleted || 0) + 1;
                if (chore.goal > 0 && count >= chore.goal) { msg = `PRIZE! 🎁<br><small>${chore.prize}</small>`; chore.timesCompleted = 0; }
                else if (chore.goal > 0) { chore.timesCompleted = count; }
            } else {
                overlay.className = "card-celebration teen-theme";
                msg = teenMessages[Math.floor(Math.random()*teenMessages.length)];
                if (chore.goal > 0) chore.timesCompleted = (chore.timesCompleted || 0) + 1;
            }
            msgBox.innerHTML = msg; overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.display = 'none'; save(); }, 5000);
        } else { save(); }
    }

    function approveChore(appId) {
        const app = state.approvals.find(a => a.id === appId);
        const mem = state.members.find(m => m.id === app.memberId);
        const chore = state.chores.find(c => c.id === app.choreId);
        if(mem) mem.points += app.points; if(chore) chore.lastCompleted = app.date;
        state.approvals = state.approvals.filter(a => a.id !== appId); save();
    }
    function resetAllChoreChecks() { if(confirm("Deep Reset Progress?")) { state.chores.forEach(c => { c.lastCompleted = null; c.timesCompleted = 0; }); state.approvals = []; save(); } }
    function addMember() { const n = document.getElementById('m-name'); if(!n.value) return; state.members.push({id:Date.now(), name:n.value, role:document.getElementById('m-role').value, points:0}); n.value=''; save(); }
    function adjustPoints(id, current) { const m = state.members.find(x => x.id === id); const val = parseInt(prompt(`Adjust ${m.name}?`, -current)); if(!isNaN(val)) { m.points += val; save(); } }
    function updateAssigneeDropdowns() { const html = state.members.map(m => `<option value="${m.id}">${m.name}</option>`).join(''); document.getElementById('c-assignee').innerHTML = html; }
    function addChore() { const n = document.getElementById('c-name'); if(!n.value) return; state.chores.push({ id: Date.now(), name: n.value, desc: document.getElementById('c-desc').value, assigneeId: parseInt(document.getElementById('c-assignee').value), lastCompleted: null, points: parseInt(document.getElementById('c-points').value), type: document.getElementById('c-type').value, dynamic: { max: parseInt(document.getElementById('c-max').value), min: parseInt(document.getElementById('c-min').value) }, goal: parseInt(document.getElementById('c-goal').value) || 0, prize: document.getElementById('c-prize').value || "", timesCompleted: 0 }); n.value=''; save(); }
    function toggleAccordion(key) { state[key] = !state[key]; save(); }
    function togglePointForm(sel, sR, dR) { const t = document.getElementById(sel).value; document.getElementById(sR).classList.toggle('hidden', t !== 'static'); document.getElementById(dR).classList.toggle('hidden', t !== 'dynamic'); }
    function exportData() { const blob = new Blob([JSON.stringify(state)], {type:"application/json"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `FamilyHub_Backup.json`; a.click(); }
    function importData(e) { const r = new FileReader(); r.onload = (x) => { try { state = JSON.parse(x.target.result); save(); location.reload(); } catch(err) { alert("Invalid File"); } }; r.readAsText(e.target.files[0]); }

    function renderAll() {
        const today = new Date().toDateString();
        document.getElementById('approval-badge').innerText = state.approvals.length;
        document.getElementById('approval-badge').classList.toggle('hidden', state.approvals.length === 0);
        document.getElementById('quote-box').innerText = `"${quotes[new Date().getDate() % quotes.length]}"`;
        const dash = document.getElementById('chores-body');
        dash.innerHTML = state.members.map(m => {
            const chores = state.chores.filter(c => c.assigneeId === m.id);
            const cur = currencyMap[m.role];
            return `<div class="user-card" id="card-${m.id}">
                <div class="card-celebration" id="celebrate-${m.id}"><div class="card-celebration-msg"></div></div>
                <div class="user-header"><h3>${m.name}</h3><span class="currency-pill">${m.points} ${cur}</span></div>
                <div class="chore-list">
                ${chores.length===0?'<p style="padding:15px;">No chores assigned.</p>':chores.map(c => {
                    const isP = state.approvals.some(a => a.choreId === c.id); const isD = c.lastCompleted === today;
                    let progHtml = "";
                    if(c.goal > 0) { const tc = (c.timesCompleted || 0); const pct = Math.min(100, (tc / c.goal) * 100); progHtml = `<div class="milestone-text">${tc}/${c.goal} to ${c.prize}</div><div class="progress-container"><div class="progress-fill" style="width:${pct}%"></div></div>`; }
                    return `<div class="chore-item ${isD?'completed':(isP?'pending':'')}"><input type="checkbox" ${isD||isP?'checked disabled':''} onchange="toggleChoreCompletion(${c.id}, ${m.id})"><div class="chore-info"><strong>${c.name}</strong><small>${c.desc||''}</small>${progHtml}</div><div class="chore-val">${m.role!=='adult'?calculateVal(c):''}</div></div>`;
                }).join('')}</div></div>`;
        }).join('');
        document.getElementById('member-list-body').innerHTML = state.members.map(m => `<tr><td><strong>${m.name}</strong></td><td>${m.role}</td><td>${m.points} <button class="btn-adjust" onclick="adjustPoints(${m.id}, ${m.points})">±</button></td><td><button class="btn-danger" onclick="state.members=state.members.filter(x=>x.id!==${m.id}); save();">Del</button></td></tr>`).join('');
        document.getElementById('chore-list-body').innerHTML = state.chores.map(c => `<tr><td><strong>${c.name}</strong></td><td>${c.goal || '--'}</td><td>${state.members.find(x=>x.id===c.assigneeId)?.name}</td><td><button class="btn-danger" onclick="state.chores=state.chores.filter(x=>x.id!==${c.id}); save();">Del</button></td></tr>`).join('');
        document.getElementById('approval-list-body').innerHTML = state.approvals.map(a => `<tr><td>${state.members.find(m=>m.id===a.memberId)?.name}</td><td>${a.choreName}</td><td>${a.points}</td><td><button class="btn-primary" style="background:var(--success); padding:5px 10px;" onclick="approveChore(${a.id})">Approve</button> <button class="btn-danger" style="padding:5px 10px;" onclick="rejectChore(${a.id})">Reject</button></td></tr>`).join('');
        document.getElementById('chores-body').classList.toggle('hidden', !state.choresVisible);
        document.getElementById('week-body').classList.toggle('hidden', !state.weekVisible);
    }
    loadCalendars(); renderAll(); showSection('dashboard');
</script>
</body>
</html>
