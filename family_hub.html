<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Family Hub</title>
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"Family Hub","short_name":"FamilyHub","start_url":"/family_hub/family_hub.html","display":"standalone","background_color":"#000000","theme_color":"#000000","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/609/609803.png","sizes":"512x512","type":"image/png"}]}'>

    <style>
        /* TRUE DARK THEME ENGINE */
        :root { 
            --primary: #000000; --secondary: #111111; --accent: #4ecca3; 
            --success: #4ecca3; --danger: #ff4d4d; --warning: #f39c12;
            --bg: #f0f2f5; --card-bg: #ffffff; --text-main: #1a1a2e; 
            --text-muted: #666; --border: #eeeeee; --nav-text: #999999;
            --input-bg: #ffffff;
        }

        body.dark-mode {
            --bg: #000000; --card-bg: #0a0a0a; 
            --text-main: #ffffff; --text-muted: #a0a0a0; 
            --border: #333333; --nav-text: #eeeeee;
            --input-bg: #1a1a2e; /* Visible text boxes in dark mode */
        }
        
        body { font-family: 'Inter', 'Segoe UI', sans-serif; margin: 0; display: flex; background: var(--bg); color: var(--text-main); transition: 0.3s; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* Sidebar */
        nav { width: 220px; background: var(--primary); color: white; height: 100vh; position: fixed; z-index: 100; transition: 0.3s; border-right: 1px solid var(--border); }
        nav.collapsed { width: 0; }
        nav h2 { padding: 20px; text-align: center; border-bottom: 1px solid var(--border); margin: 0; font-size: 1rem; color: var(--accent); }
        nav button { width: 100%; padding: 12px 20px; background: none; border: none; color: var(--nav-text); text-align: left; font-size: 14px; cursor: pointer; display: flex; justify-content: space-between; }
        nav button.active { background: rgba(78, 204, 163, 0.1); color: var(--accent); border-left: 3px solid var(--accent); }

        #nav-toggle { position: fixed; left: 230px; top: 15px; z-index: 101; background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        nav.collapsed + #nav-toggle { left: 15px; }

        main { margin-left: 220px; padding: 20px 30px; width: 100%; box-sizing: border-box; transition: 0.3s; }
        main.expanded { margin-left: 0; padding-left: 60px; }
        
        @media (max-width: 768px) {
            main { margin-left: 0; padding-top: 70px; }
            nav { width: 85%; }
            #nav-toggle { left: 15px; }
        }

        .card { background: var(--card-bg); padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; border: 1px solid var(--border); }
        h1 { font-size: 1.8rem; font-weight: 900; color: var(--text-main); margin: 0; }
        
        /* Dashboard Cards */
        .user-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .user-card { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .user-header { padding: 12px 15px; background: rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .currency-pill { font-size: 0.8rem; font-weight: 800; color: var(--accent); background: rgba(78, 204, 163, 0.15); padding: 4px 12px; border-radius: 20px; }
        
        .chore-item { display: flex; align-items: center; gap: 12px; padding: 12px 15px; border-bottom: 1px solid var(--border); }
        .chore-item.completed { opacity: 0.4; background: rgba(0,0,0,0.2); }
        .chore-info strong { font-size: 0.9rem; color: var(--text-main); }
        
        .progress-container { width: 100%; background: #333; border-radius: 10px; height: 6px; margin-top: 8px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, var(--accent), #2ecc71); height: 100%; transition: 0.5s; }

        input[type="checkbox"] { width: 24px; height: 24px; cursor: pointer; accent-color: var(--accent); }

        /* FORM VISIBILITY FIXES */
        .admin-form-box { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        label { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        input, select, textarea { 
            background: var(--input-bg); 
            color: var(--text-main); 
            border: 1px solid var(--border); 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 14px; 
            width: 100%;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 8px rgba(78, 204, 163, 0.3); }

        .btn-primary { background: var(--accent); color: #000; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 14px; transition: 0.2s; }
        .btn-primary:hover { transform: scale(1.02); filter: brightness(1.1); }
        .btn-danger { background: none; color: var(--danger); border: 1px solid var(--danger); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }

        /* Modal Styling */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #0a0a0a; color: white; width: 90%; max-width: 450px; padding: 40px; border-radius: 24px; text-align: center; border: 1px solid var(--border); }
        
        .calendar-container { width: 100%; height: 600px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: #000; }
        .calendar-container iframe { width: 100%; height: 100%; border: 0; filter: var(--calendar-filter, none); }
        body.dark-mode { --calendar-filter: invert(0.92) hue-rotate(180deg) brightness(1.1); }
    </style>
</head>
<body onmousemove="resetSidebarTimer()" ontouchstart="resetSidebarTimer()">

<div id="setup-wizard" class="modal-overlay">
    <div class="modal-content">
        <h2 style="color: var(--accent);">Initialize Hub</h2>
        <p>Choose a Master Passcode for your family.</p>
        <input type="password" id="setup-passcode" placeholder="Enter Code" style="text-align: center; font-size: 20px;">
        <button class="btn-primary" style="width: 100%; margin-top: 20px;" onclick="finalizeSetup()">Create Account</button>
    </div>
</div>

<nav id="sidebar">
    <h2>FAMILY HUB</h2>
    <button id="nav-dashboard" onclick="showSection('dashboard')">🏠 Dashboard</button>
    <div id="admin-menu" class="admin-only">
        <button onclick="handleAdminNav('admin-approvals')">✅ Approvals <span id="approval-badge" class="badge hidden">0</span></button>
        <button onclick="handleAdminNav('admin-members')">👥 Manage</button>
        <button onclick="handleAdminNav('admin-chores')">⚙️ Chores</button>
    </div>
    <div style="padding: 20px; display: flex; flex-direction: column; gap: 10px;">
        <button onclick="toggleDarkMode()" style="border: 1px solid var(--border); color: white; border-radius: 8px; padding: 10px; cursor: pointer;">
            <span id="theme-icon">🌙</span> Dark Mode
        </button>
        <button id="unlock-btn" style="color: var(--warning); text-align: left;" onclick="toggleAdminLock()">🔒 Unlock</button>
    </div>
</nav>

<button id="nav-toggle" onclick="toggleSidebar()">☰</button>

<main id="main-content">
    <section id="dashboard" class="content-section">
        <div class="header-row">
            <h1>Command Center</h1>
            <div id="clock-box" style="text-align:right">
                <div id="current-date" style="color: var(--text-muted); font-size: 0.9rem;"></div>
                <div id="current-time" style="font-weight: 900; font-size: 1.5rem; color: var(--accent);"></div>
            </div>
        </div>
        
        <div class="card">
            <h3 style="margin:0 0 15px 0" onclick="toggleAccordion('choresVisible')">🧹 Daily Chores</h3>
            <div id="chores-body" class="user-grid"></div>
        </div>

        <div class="card">
            <h3 style="margin:0 0 15px 0" onclick="toggleAccordion('calVisible')">📅 Family Schedule</h3>
            <div id="cal-body" class="hidden">
                <div class="calendar-container" id="calendar-slot"></div>
            </div>
        </div>
    </section>

    <section id="admin-members" class="content-section hidden">
        <div class="card">
            <h1>Members & Privacy</h1>
            <div class="admin-form-box">
                <div class="form-group"><label>Name</label><input type="text" id="m-name"></div>
                <div class="form-group"><label>Role</label><select id="m-role"><option value="kid">Kid</option><option value="teen">Teen</option><option value="adult">Adult</option></select></div>
                <button class="btn-primary" onclick="addMember()">Add Member</button>
            </div>
            <table><thead><tr><th>Name</th><th>Role</th><th>Points</th><th>Action</th></tr></thead><tbody id="member-list-body"></tbody></table>
            
            <div style="margin-top:20px; border: 1px solid var(--border); padding: 20px; border-radius: 12px;">
                <label>Private Google Calendar Embed URL</label>
                <input type="text" id="cal-url-input" placeholder="https://calendar.google.com/calendar/embed?..." style="margin-bottom: 10px;">
                <button class="btn-primary" onclick="saveCalendarUrl()">Update Schedule</button>
            </div>
            
            <div style="margin-top: 20px;">
                <button class="btn-primary" style="background:#333; color:white;" onclick="exportData()">📤 Backup Hub</button>
                <button onclick="nuclearReset()" class="btn-danger">☢️ Factory Reset</button>
            </div>
        </div>
    </section>

    <section id="admin-chores" class="content-section hidden">
        <div class="card">
            <h1>Chore Configuration</h1>
            <div class="admin-form-box">
                <div class="form-group"><label>Name</label><input type="text" id="c-name"></div>
                <div class="form-group"><label>Assignee</label><select id="c-assignee"></select></div>
                <div class="form-group"><label>Goal Count</label><input type="number" id="c-goal" value="0"></div>
                <div class="form-group"><label>Prize</label><input type="text" id="c-prize"></div>
                <div class="form-group"><label>Points</label><input type="number" id="c-points" value="5"></div>
                <div class="form-group"><label>Type</label><select id="c-type"><option value="static">Static</option><option value="dynamic">Dynamic</option></select></div>
                <button class="btn-primary" onclick="addChore()">Add Chore</button>
            </div>
            <table id="chore-list-body"></table>
        </div>
    </section>

    <section id="admin-approvals" class="content-section hidden">
        <div class="card"><h1>Approval Queue</h1><table id="approval-list-body"></table></div>
    </section>
</main>

<script>
    let state = JSON.parse(localStorage.getItem('familyHubData')) || { 
        members: [], chores: [], approvals: [], 
        lastResetDate: new Date().toDateString(), 
        choresVisible: true, calVisible: false, calendarUrl: "", adminPasscode: ""
    };

    let isUnlocked = false; 
    let sidebarTimer;
    const currencyMap = { kid: "tokens", teen: "minutes", adult: "" };

    function toggleDarkMode() {
        const isDark = document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
    }
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        document.getElementById('theme-icon').innerText = '☀️';
    }

    function finalizeSetup() {
        const p = document.getElementById('setup-passcode').value;
        if (!p) return alert("Enter code.");
        state.adminPasscode = p; save();
        document.getElementById('setup-wizard').style.display = 'none';
    }

    function toggleAdminLock() {
        if (isUnlocked) {
            isUnlocked = false; document.getElementById('admin-menu').style.display = 'none';
            document.getElementById('unlock-btn').innerHTML = "🔒 Unlock";
        } else {
            const entry = prompt("Passcode:");
            if (entry === state.adminPasscode) {
                isUnlocked = true; document.getElementById('admin-menu').style.display = 'block';
                document.getElementById('unlock-btn').innerHTML = "🔓 Unlocked";
            }
        }
    }

    function save() { localStorage.setItem('familyHubData', JSON.stringify(state)); renderAll(); }
    function nuclearReset() { if(confirm("Factory Reset? All data lost.")) { localStorage.removeItem('familyHubData'); location.reload(); } }

    function updateClock() {
        const now = new Date();
        document.getElementById('current-date').innerText = now.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
        document.getElementById('current-time').innerText = now.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
    }
    setInterval(updateClock, 1000); updateClock();

    function showSection(id) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function renderAll() {
        const today = new Date().toDateString();
        const dash = document.getElementById('chores-body');
        dash.innerHTML = state.members.map(m => {
            const chores = state.chores.filter(c => c.assigneeId === m.id);
            return `<div class="user-card">
                <div class="user-header"><h3>${m.name}</h3><span class="currency-pill">${m.points} ${currencyMap[m.role]}</span></div>
                <div class="chore-list">
                ${chores.length===0?'<p style="padding:10px; font-size:10px; opacity:0.5;">Empty.</p>':chores.map(c => {
                    const isD = c.lastCompleted === today;
                    let prog = "";
                    if(c.goal > 0) { const pct = Math.min(100, ((c.timesCompleted||0)/c.goal)*100); prog = `<div class="progress-container"><div class="progress-fill" style="width:${pct}%"></div></div>`; }
                    return `<div class="chore-item ${isD?'completed':''}"><input type="checkbox" ${isD?'checked disabled':''} onchange="toggleChoreCompletion(${c.id}, ${m.id})"><div class="chore-info"><strong>${c.name}</strong>${prog}</div></div>`;
                }).join('')}</div></div>`;
        }).join('');
        
        document.getElementById('member-list-body').innerHTML = state.members.map(m => `<tr><td>${m.name}</td><td>${m.role}</td><td>${m.points}</td><td><button class="btn-danger" onclick="state.members=state.members.filter(x=>x.id!==${m.id}); save();">X</button></td></tr>`).join('');
        
        if(state.calVisible && state.calendarUrl) {
            document.getElementById('calendar-slot').innerHTML = `<iframe src="${state.calendarUrl}"></iframe>`;
        }
    }

    /* Core logic for chore toggling, member adding, etc. stays same as previous working versions */
    function toggleChoreCompletion(cid, mid) {
        const c = state.chores.find(x => x.id === cid);
        c.lastCompleted = new Date().toDateString();
        const m = state.members.find(x => x.id === mid);
        m.points += (c.points || 5);
        save();
    }
    
    function addMember() { const n = document.getElementById('m-name').value; const r = document.getElementById('m-role').value; if(!n) return; state.members.push({id:Date.now(), name:n, role:r, points:0}); save(); }
    function addChore() { const n = document.getElementById('c-name').value; const a = document.getElementById('c-assignee').value; if(!n) return; state.chores.push({id:Date.now(), name:n, assigneeId:parseInt(a), lastCompleted:null, points:parseInt(document.getElementById('c-points').value), goal:parseInt(document.getElementById('c-goal').value), timesCompleted:0}); save(); }
    function saveCalendarUrl() { state.calendarUrl = document.getElementById('cal-url-input').value; save(); location.reload(); }
    function toggleAccordion(k) { state[k] = !state[k]; save(); }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); document.getElementById('main-content').classList.toggle('expanded'); }
    function exportData() { const blob = new Blob([JSON.stringify(state)], {type:"application/json"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Backup.json`; a.click(); }
    function handleAdminNav(id) { showSection(id); }

    if (!state.adminPasscode) document.getElementById('setup-wizard').style.display = 'flex';
    updateAssigneeDropdowns();
    function updateAssigneeDropdowns() { const html = state.members.map(m => `<option value="${m.id}">${m.name}</option>`).join(''); document.getElementById('c-assignee').innerHTML = html; }
    renderAll();
</script>
</body>
</html>
